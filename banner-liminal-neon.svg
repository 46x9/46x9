<svg fill="none" viewBox="0 0 800 400" width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a0015" />
      <stop offset="60%" stop-color="#2a0035" />
      <stop offset="100%" stop-color="#05000a" />
    </linearGradient>

    <!-- Sun Gradient -->
    <linearGradient id="sun" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFDD00" />
      <stop offset="70%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#46006B" />
    </linearGradient>

    <!-- Glowing Text Filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Sun Cuts pattern -->
    <pattern id="scanlines" width="4" height="10" patternUnits="userSpaceOnUse">
      <rect width="4" height="3" fill="#0a0015" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="100" cy="50" r="1.5"/>
    <circle cx="200" cy="150" r="1"/>
    <circle cx="350" cy="80" r="2"/>
    <circle cx="500" cy="120" r="1"/>
    <circle cx="650" cy="60" r="1.5"/>
    <circle cx="750" cy="160" r="2"/>
    <circle cx="50" cy="200" r="1"/>
  </g>

  <!-- Sun -->
  <mask id="sun-mask">
    <circle cx="400" cy="180" r="120" fill="white" />
    <!-- Horizontal slices missing -->
    <rect x="250" y="210" width="300" height="6" fill="black" />
    <rect x="250" y="230" width="300" height="8" fill="black" />
    <rect x="250" y="255" width="300" height="10" fill="black" />
    <rect x="250" y="285" width="300" height="15" fill="black" />
  </mask>
  <circle cx="400" cy="180" r="120" fill="url(#sun)" mask="url(#sun-mask)" />

  <!-- The Grid (Liminal Space Perspective) -->
  <g stroke="#00FFFF" stroke-width="1.5" opacity="0.5" filter="url(#cyan-glow)">
    <!-- Horizon Line -->
    <line x1="0" y1="230" x2="800" y2="230" stroke="#FF00FF" stroke-width="3" filter="url(#neon-glow)" />
    
    <!-- Vertical Perspective Lines -->
    <line x1="400" y1="230" x2="-200" y2="400" />
    <line x1="400" y1="230" x2="0" y2="400" />
    <line x1="400" y1="230" x2="200" y2="400" />
    <line x1="400" y1="230" x2="400" y2="400" />
    <line x1="400" y1="230" x2="600" y2="400" />
    <line x1="400" y1="230" x2="800" y2="400" />
    <line x1="400" y1="230" x2="1000" y2="400" />

    <!-- Horizontal Grid Lines -->
    <line x1="0" y1="250" x2="800" y2="250" stroke-width="0.5"/>
    <line x1="0" y1="270" x2="800" y2="270" stroke-width="1"/>
    <line x1="0" y1="300" x2="800" y2="300" stroke-width="1.5"/>
    <line x1="0" y1="340" x2="800" y2="340" stroke-width="2"/>
    <line x1="0" y1="390" x2="800" y2="390" stroke-width="2.5"/>
  </g>

  <!-- Titles -->
  <g text-anchor="middle" font-family="'Courier New', monospace, sans-serif">
    <!-- Main Neon Title -->
    <text x="400" y="160" font-size="70" font-weight="900" fill="#FF00FF" filter="url(#neon-glow)" font-style="italic" letter-spacing="5">
      46x9
    </text>
    <text x="400" y="160" font-size="70" font-weight="900" fill="#FFFFFF" font-style="italic" letter-spacing="5">
      46x9
    </text>

    <!-- Subtext -->
    <text x="400" y="210" font-size="24" fill="#00FFFF" filter="url(#cyan-glow)" letter-spacing="8" font-weight="bold">
      WELCOME TO THE VOID
    </text>
  </g>
</svg>
